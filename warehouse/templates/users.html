{% extends "base.html" %}
{% block title %}Users{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-slate-800">User Management</h1>
  <p class="text-slate-500 text-sm mt-1">Admin only</p>
</div>

<!-- Add user form -->
<div class="card mb-6">
  <h2 class="font-semibold text-slate-700 mb-4">Create New User</h2>
  <form method="POST" action="/users" class="grid grid-cols-4 gap-4">
    <div>
      <label class="form-label">Username</label>
      <input name="username" type="text" required class="form-input" placeholder="e.g. operator2">
    </div>
    <div>
      <label class="form-label">Password</label>
      <input name="password" type="password" required class="form-input" placeholder="Min. 6 chars">
    </div>
    <div>
      <label class="form-label">Role</label>
      <select name="role" class="form-input">
        <option value="operator">Operator</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="flex items-end">
      <button type="submit" class="btn-primary w-full">Create User</button>
    </div>
  </form>
</div>

<!-- Users table -->
<div class="card p-0 overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-slate-50 border-b border-slate-200">
      <tr class="text-left text-slate-500">
        <th class="px-4 py-3 font-medium">ID</th>
        <th class="px-4 py-3 font-medium">Username</th>
        <th class="px-4 py-3 font-medium">Role</th>
        <th class="px-4 py-3 font-medium"></th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      {% for u in users %}
      <tr class="hover:bg-slate-50">
        <td class="px-4 py-3 font-mono text-slate-400">#{{ u.id }}</td>
        <td class="px-4 py-3 font-medium text-slate-800">{{ u.username }}</td>
        <td class="px-4 py-3">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium
            {% if u.role == 'admin' %}bg-purple-100 text-purple-700
            {% else %}bg-blue-100 text-blue-700{% endif %}">
            {{ u.role }}
          </span>
        </td>
        <td class="px-4 py-3">
          {% if u.id != user.id %}
          <form method="POST" action="/users/{{ u.id }}/delete"
                onsubmit="return confirm('Delete user {{ u.username }}?')">
            <button type="submit" class="text-red-500 hover:text-red-700 text-xs font-medium">Delete</button>
          </form>
          {% else %}
          <span class="text-xs text-slate-400">current</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
