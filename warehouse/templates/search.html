{% extends "base.html" %}
{% block title %}Search{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-slate-800">Search Inventory</h1>
  <p class="text-slate-500 text-sm mt-1">Find items by name, SKU, or description</p>
</div>

<div class="card mb-6">
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input
      id="search-input"
      type="text"
      name="q"
      value="{{ query }}"
      placeholder="Type item name or SKU…"
      class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
      hx-get="/search/results"
      hx-trigger="keyup changed delay:300ms"
      hx-target="#results"
      hx-include="[name='q']"
      autofocus
    >
  </div>
</div>

<div id="results">
  {% include "partials/search_results.html" %}
</div>
{% endblock %}
