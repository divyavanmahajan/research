<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Warehouse Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">📦</div>
      <h1 class="text-white text-2xl font-bold">Warehouse Management</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to continue</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter username"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter password"
          >
        </div>

        <button
          type="submit"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-150"
        >
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      Demo credentials: <span class="text-slate-300">admin / admin123</span> &nbsp;|&nbsp; <span class="text-slate-300">operator1 / op123</span>
    </p>
  </div>

</body>
</html>
